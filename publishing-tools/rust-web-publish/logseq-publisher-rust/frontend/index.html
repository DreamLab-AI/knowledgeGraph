<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Logseq Publisher - A fast, modern static site for Logseq content">

  <title>Logseq Publisher</title>

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/main.css">

  <!-- Metadata will be injected by Rust here -->
  <script>
    // This will be replaced by Rust with actual metadata
    window.LOGSEQ_METADATA = {
      pages: [],
      graph: {
        title: "My Logseq Graph",
        description: ""
      }
    };
  </script>

  <!-- Preload critical resources -->
  <link rel="preload" href="/src/cache.js" as="script">
  <link rel="preload" href="/src/router.js" as="script">
  <link rel="preload" href="/src/contentLoader.js" as="script">
  <link rel="preload" href="/src/renderer.js" as="script">
  <link rel="preload" href="/src/search.js" as="script">
  <link rel="preload" href="/src/graph.js" as="script">
  <link rel="preload" href="/src/app.js" as="script">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <a href="/" id="logo">📝 Logseq</a>

      <nav id="nav">
        <button id="search-toggle" class="btn-icon" aria-label="Search" title="Search (/)">
          🔍
        </button>
        <button id="graph-toggle" class="btn-icon" aria-label="Graph View" title="Graph (g)">
          🕸️
        </button>
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme" title="Toggle Theme (Ctrl+t)">
          🌓
        </button>
        <button id="sidebar-toggle" class="btn-icon" aria-label="Toggle Sidebar" title="Sidebar (Ctrl+s)">
          ☰
        </button>
      </nav>
    </header>

    <!-- Main Content Area -->
    <main id="main">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-section">
          <h3>Quick Links</h3>
          <ul class="sidebar-list">
            <li><a href="/">Home</a></li>
            <li><a href="/graph">Graph View</a></li>
          </ul>
        </div>

        <div class="sidebar-section">
          <h3>Recent Pages</h3>
          <ul class="sidebar-list" id="recent-pages">
            <!-- Populated by JavaScript -->
          </ul>
        </div>
      </aside>

      <!-- Content -->
      <div id="content">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer id="footer">
      <p>
        Generated with Logseq Publisher |
        <a href="https://logseq.com" target="_blank" rel="noopener">Logseq</a>
      </p>
    </footer>
  </div>

  <!-- Search Overlay -->
  <div id="search-overlay">
    <div id="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search pages... (press / to search, Esc to close)"
        autocomplete="off"
        spellcheck="false"
      >
      <div id="search-results"></div>
    </div>
  </div>

  <!-- Graph Overlay -->
  <div id="graph-overlay">
    <button id="graph-close" class="btn" aria-label="Close Graph">Close (Esc)</button>
    <div id="graph-container">
      <canvas id="graph-canvas"></canvas>
    </div>
  </div>

  <!-- Scripts (loaded in order) -->
  <script src="/src/cache.js"></script>
  <script src="/src/router.js"></script>
  <script src="/src/contentLoader.js"></script>
  <script src="/src/renderer.js"></script>
  <script src="/src/search.js"></script>
  <script src="/src/graph.js"></script>
  <script src="/src/app.js"></script>

  <!-- Service Worker Registration (optional) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
