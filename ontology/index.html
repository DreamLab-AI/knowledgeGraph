<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Narrative Goldmine Ontology - Loading...</title>
  <script>
    // Redirect to original index with our ontology in localStorage
    (function() {
      var ontologyData = null;

      // Fetch the ontology JSON
      fetch('data/narrativegoldmine-ontology.json')
        .then(function(response) { return response.json(); })
        .then(function(data) {
          // Store in localStorage with the expected key format
          localStorage.setItem('narrativegoldmine-ontology', JSON.stringify(data));

          // Redirect to main page with file parameter
          window.location.href = 'webvowl.html#file=narrativegoldmine-ontology';
        })
        .catch(function(err) {
          document.body.innerHTML = '<h1>Failed to load ontology</h1><p>' + err.message + '</p>';
        });
    })();
  </script>
</head>
<body>
  <p>Loading Narrative Goldmine Ontology...</p>
</body>
</html>
